name: Advanced — Percy

# PER-8195 Phase 3 — advanced example for @percy/testcafe.
# Runs the advanced suite the same way the basic job runs its suite —
# under Percy with the repo's PERCY_TOKEN. No testing-mode coverage gate
# or external assertion helper (matches master).
on: [push, pull_request]

# Limit GITHUB_TOKEN to read-only (CodeQL: workflow-does-not-contain-permissions)
permissions:
  contents: read

jobs:
  advanced:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: advanced
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install advanced/ dependencies
        run: npm ci
      - name: Run advanced tests
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: npm run test:advanced
